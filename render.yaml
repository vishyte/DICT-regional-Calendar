services:
  # Backend API Service
  - name: dict-regional-calendar-backend
    type: web
    region: oregon
    runtime: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: dict-calendar-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://r11regionalcalender.web.app/
      - key: SUPERADMIN_USERNAME
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false

  # Frontend Static Site
  - name: dict-calendar-frontend
    type: static
    region: oregon
    buildCommand: npm install && npm run build
    outputDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://dict-regional-calendar-backend.onrender.com/api

# Managed PostgreSQL Database
databases:
  - name: dict-calendar-db
    region: oregon
    plan: free
